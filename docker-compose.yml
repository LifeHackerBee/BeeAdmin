version: '3.8'

services:
  bee-admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时传递环境变量
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_IBKR_API_URL=${VITE_IBKR_API_URL}
        - VITE_IBKR_API_KEY=${VITE_IBKR_API_KEY}
        - VITE_HYPERLIQUID_TRADER_API_URL=${VITE_HYPERLIQUID_TRADER_API_URL}
        - VITE_HYPERLIQUID_TRADER_API_KEY=${VITE_HYPERLIQUID_TRADER_API_KEY}
        - VITE_CRAWL4AI_API_URL=${VITE_CRAWL4AI_API_URL}
        - VITE_CRAWL4AI_SECRET_KEY=${VITE_CRAWL4AI_SECRET_KEY}
        - VITE_CF_ACCESS_CLIENT_ID=${VITE_CF_ACCESS_CLIENT_ID}
        - VITE_CF_ACCESS_CLIENT_SECRET=${VITE_CF_ACCESS_CLIENT_SECRET}
        - VITE_ALLOW_SIGNUP=${VITE_ALLOW_SIGNUP}
        - VITE_ALLOW_FORGOT_PASSWORD=${VITE_ALLOW_FORGOT_PASSWORD}
        - VITE_NEBULA_DEEP_RESEARCH_API_URL=${VITE_NEBULA_DEEP_RESEARCH_API_URL}
        - VITE_NEBULA_DEEP_RESEARCH_TOKEN=${VITE_NEBULA_DEEP_RESEARCH_TOKEN}
        - VITE_IBKR_ACCOUNT_ID=${VITE_IBKR_ACCOUNT_ID}
        - VITE_HUOHUO_API_URL=${VITE_HUOHUO_API_URL}
        - VITE_MANMAN_API_URL=${VITE_MANMAN_API_URL}
        - VITE_OPENAI_BASE_URL=${VITE_OPENAI_BASE_URL}
        - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}
        - VITE_OPENAI_MODEL=${VITE_OPENAI_MODEL}
    container_name: bee-admin
    ports:
      - "3000:80"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - bee-admin-network

networks:
  bee-admin-network:
    driver: bridge

